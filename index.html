<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANARY RADAR v12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(28, 25, 23, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(87, 83, 78, 0.8); border-radius: 2px; }
    </style>
</head>
<body class="bg-stone-950 text-stone-200 p-1 sm:p-4">
    <header class="mb-3 border-b border-stone-800 pb-2 px-1">
        <h1 class="text-xl sm:text-3xl font-black text-cyan-500 tracking-tighter">CANARY RADAR v12.0 <span class="text-xs text-stone-600 font-normal">BEDROCK-INTEGRATED</span></h1>
        <div class="flex items-center mt-1">
            <div class="w-2 h-2 bg-emerald-500 rounded-full blink mr-2"></div>
            <p id="timestamp" class="text-stone-500 text-xs">Connecting to orbital satellite...</p>
        </div>
    </header>

    <div id="status-display" class="mb-4 mx-1 p-3 bg-stone-900 border-l-4 border-stone-600 rounded shadow-lg text-base sm:text-lg font-bold leading-tight">
        待機中...
    </div>

    <div class="mb-4 mx-1">
        <div class="bg-stone-900/80 p-3 rounded border border-purple-900/50 shadow-[0_0_15px_rgba(147,51,234,0.1)] relative">
            <div class="flex justify-between items-center mb-2 border-b border-stone-800 pb-1">
                <div>
                    <h2 class="text-sm font-bold text-purple-400 uppercase tracking-widest leading-none">Tier -1: The Bedrock</h2>
                    <p class="text-[10px] text-stone-500 mt-1">PPA信用プレミアム (XLU/TLT Ratio)</p>
                </div>
                <div class="text-right">
                    <div id="bedrock-ratio" class="text-xl font-black text-purple-300">-</div>
                    <div id="bedrock-change" class="text-xs font-bold">-</div>
                </div>
            </div>
            <div class="w-full h-40 sm:h-64 relative">
                <canvas id="bedrockChart"></canvas>
            </div>
        </div>
    </div>

    <div class="mb-4 mx-1">
        <div class="bg-stone-900/80 p-3 rounded border border-red-900/50">
            <div class="flex justify-between items-center mb-3 border-b border-stone-800 pb-1">
                <div>
                    <h2 class="text-sm font-bold text-red-500 uppercase tracking-widest leading-none">Tier 0: Macro Energy</h2>
                    <p class="text-[10px] text-stone-500 mt-1">根源的エネルギー限界・ガス先物</p>
                </div>
                <div id="t0-avg" class="text-xl font-black">-</div>
            </div>
            <div id="t0-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mx-1 mb-4">
        <div class="bg-stone-900 p-3 rounded border border-stone-800">
            <div class="flex justify-between items-center mb-3 border-b border-stone-800 pb-1">
                <div>
                    <h2 class="text-sm font-bold text-cyan-400 uppercase tracking-widest leading-none">Tier 1: Foundation</h2>
                </div>
                <div id="t1-avg" class="text-lg font-black">-</div>
            </div>
            <div id="t1-list" class="space-y-2"></div>
        </div>
        
        <div class="bg-stone-900 p-3 rounded border border-stone-800">
            <div class="flex justify-between items-center mb-3 border-b border-stone-800 pb-1">
                <div>
                    <h2 class="text-sm font-bold text-amber-400 uppercase tracking-widest leading-none">Tier 1.5: Compute</h2>
                </div>
                <div id="t15-avg" class="text-lg font-black">-</div>
            </div>
            <div id="t15-list" class="space-y-2"></div>
        </div>

        <div class="bg-stone-900 p-3 rounded border border-stone-800">
             <div class="flex justify-between items-center mb-3 border-b border-stone-800 pb-1">
                <div>
                    <h2 class="text-sm font-bold text-fuchsia-400 uppercase tracking-widest leading-none">Tier 2: Velocity</h2>
                </div>
                <div id="t2-avg" class="text-lg font-black">-</div>
            </div>
            <div id="t2-list" class="space-y-2"></div>
        </div>

        <div class="bg-stone-900 p-3 rounded border border-stone-800">
            <div class="flex justify-between items-center mb-3 border-b border-stone-800 pb-1">
                <div>
                    <h2 class="text-sm font-bold text-orange-500 uppercase tracking-widest leading-none">Tier 3: Upstream</h2>
                </div>
                <div id="t3-avg" class="text-lg font-black">-</div>
            </div>
            <div id="t3-list" class="space-y-2"></div>
        </div>
    </div>

    <div class="mx-1 mb-8">
        <div class="bg-stone-900 p-3 rounded border border-emerald-800">
            <div class="flex justify-between items-center mb-3 border-b border-stone-800 pb-1">
                <div>
                    <h2 class="text-sm font-bold text-emerald-400 uppercase tracking-widest leading-none">Tier 4: True Asset</h2>
                </div>
                <div id="t4-avg" class="text-xl font-black">-</div>
            </div>
            <div id="t4-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 max-h-[400px] overflow-y-auto pr-1 custom-scrollbar"></div>
        </div>
    </div>

    <script>
        let bedrockChartInstance = null;

        function getColorClass(val) {
            if (val > 1.0) return 'text-emerald-400';
            if (val > 0) return 'text-emerald-500';
            if (val < -1.0) return 'text-rose-500';
            if (val < 0) return 'text-rose-400';
            return 'text-stone-300';
        }

        function renderBedrockChart(bedrockData) {
            if (!bedrockData) return;
            
            document.getElementById('bedrock-ratio').innerText = bedrockData.current_ratio.toFixed(3);
            const chg = bedrockData.ratio_change;
            document.getElementById('bedrock-change').innerText = `${chg > 0 ? '+' : ''}${chg.toFixed(2)}%`;
            document.getElementById('bedrock-change').className = `text-xs font-bold ${getColorClass(chg)}`;

            const ctx = document.getElementById('bedrockChart').getContext('2d');
            
            if (bedrockChartInstance) bedrockChartInstance.destroy();

            bedrockChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: bedrockData.dates,
                    datasets: [
                        {
                            label: 'XLU/TLT Ratio',
                            data: bedrockData.ratio,
                            borderColor: '#a855f7', // Purple
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.1
                        },
                        {
                            label: 'Gravity (50 SMA)',
                            data: bedrockData.sma,
                            borderColor: 'rgba(255, 255, 255, 0.2)',
                            borderWidth: 1,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            tension: 0.1
                        },
                        {
                            label: 'Bubble Limit (+2σ)',
                            data: bedrockData.upper,
                            borderColor: 'rgba(239, 68, 68, 0.5)',
                            borderWidth: 1,
                            borderDash: [2, 2],
                            pointRadius: 0,
                            tension: 0.1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', titleFont: { family: 'Courier New' } }
                    },
                    scales: {
                        x: { display: false }, // スマホ表示のためにX軸のラベルは非表示
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#78716c', font: { family: 'Courier New', size: 10 } }
                        }
                    }
                }
            });
        }

        async function render() {
            try {
                const response = await fetch(`./dashboard_data.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                document.getElementById('timestamp').innerText = `Last Updated: ${new Date(data.timestamp).toLocaleString()} (JST)`;
                
                const statusEl = document.getElementById('status-display');
                statusEl.innerText = data.status;
                statusEl.className = 'mb-4 mx-1 p-3 bg-stone-900 border-l-4 rounded shadow-lg text-base sm:text-lg font-bold leading-tight ';
                if(data.status.includes('🟢')) statusEl.classList.add('border-emerald-500', 'text-emerald-400');
                else if(data.status.includes('🔴')) statusEl.classList.add('border-rose-500', 'text-rose-400', 'blink');
                else if(data.status.includes('🟡') || data.status.includes('🟠')) statusEl.classList.add('border-amber-500', 'text-amber-400');
                else statusEl.classList.add('border-stone-500', 'text-stone-300');

                // Render Bedrock Chart
                renderBedrockChart(data.bedrock);

                const mapping = {
                    'TIER_0': { list: 't0-list', avg: 't0-avg' },
                    'TIER_1': { list: 't1-list', avg: 't1-avg' },
                    'TIER_1_5': { list: 't15-list', avg: 't15-avg' },
                    'TIER_2': { list: 't2-list', avg: 't2-avg' },
                    'TIER_3': { list: 't3-list', avg: 't3-avg' },
                    'TIER_4': { list: 't4-list', avg: 't4-avg' }
                };

                for (const [tier, ids] of Object.entries(mapping)) {
                    const avgVal = data.layers[tier];
                    document.getElementById(ids.avg).innerText = `${avgVal > 0 ? '+' : ''}${avgVal.toFixed(2)}%`;
                    document.getElementById(ids.avg).className = `text-lg font-black ${getColorClass(avgVal)}`;

                    const container = document.getElementById(ids.list);
                    container.innerHTML = '';
                    
                    data.config[tier].forEach(t => {
                        const d = data.details[t];
                        if (!d) return;
                        const fullName = d.name || t;
                        
                        container.innerHTML += `
                            <div class="flex justify-between items-center p-2 bg-stone-950/70 rounded border border-stone-800">
                                <div class="flex flex-col w-2/3 pr-2">
                                    <a href="https://finance.yahoo.com/quote/${t}" target="_blank" class="font-black text-sm text-stone-100 hover:text-cyan-400">${t}</a>
                                    <p class="text-[10px] text-stone-400 truncate">${fullName}</p>
                                </div>
                                <div class="flex flex-col items-end w-1/3">
                                    <span class="${getColorClass(d.change)} font-mono text-sm font-black">
                                        ${d.change > 0 ? '+' : ''}${d.change.toFixed(2)}%
                                    </span>
                                </div>
                            </div>`;
                    });
                }
            } catch (e) { console.error(e); }
        }
        render(); setInterval(render, 60000);
    </script>
</body>
</html>
