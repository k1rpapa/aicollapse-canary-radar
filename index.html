<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infrastructure Canary Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-stone-950 text-stone-200 p-4 md:p-8">
    <header class="mb-8 border-b border-stone-800 pb-4">
        <h1 class="text-2xl md:text-3xl font-black text-cyan-500 tracking-tighter">PHYSICAL INFRASTRUCTURE CANARY v9.5</h1>
        <div class="flex items-center mt-2">
            <div class="w-2 h-2 bg-emerald-500 rounded-full blink mr-2"></div>
            <p id="timestamp" class="text-stone-500 text-xs md:text-sm">Connecting to orbital satellite...</p>
        </div>
    </header>

    <div id="status-display" class="mb-8 p-4 bg-stone-900 border-l-4 border-stone-600 rounded shadow-lg text-lg font-bold">
        待機中: データの取得を開始します...
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="dashboard">
        <!-- Tier 1 -->
        <div class="bg-stone-900 p-5 rounded-xl border border-stone-800 shadow-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 opacity-10"><span class="text-4xl">01</span></div>
            <h2 class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-4">Tier 1: Foundation<br><span class="text-[10px] text-stone-500">電力・冷却・不動産</span></h2>
            <div id="t1-avg" class="text-2xl font-black mb-4">-</div>
            <div id="t1-list" class="space-y-2"></div>
        </div>
        
        <!-- Tier 1.5 -->
        <div class="bg-stone-900 p-5 rounded-xl border border-stone-800 shadow-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 opacity-10"><span class="text-4xl">1.5</span></div>
            <h2 class="text-xs font-bold text-amber-400 uppercase tracking-widest mb-4">Tier 1.5: Compute & Fabric<br><span class="text-[10px] text-stone-500">サーバー・ネットワーク</span></h2>
            <div id="t15-avg" class="text-2xl font-black mb-4">-</div>
            <div id="t15-list" class="space-y-2"></div>
        </div>

        <!-- Tier 2 -->
        <div class="bg-stone-900 p-5 rounded-xl border border-stone-800 shadow-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 opacity-10"><span class="text-4xl">02</span></div>
            <h2 class="text-xs font-bold text-fuchsia-400 uppercase tracking-widest mb-4">Tier 2: Velocity<br><span class="text-[10px] text-stone-500">AIクラウド・サービス</span></h2>
            <div id="t2-avg" class="text-2xl font-black mb-4">-</div>
            <div id="t2-list" class="space-y-2"></div>
        </div>
    </div>

    <footer class="mt-12 text-center text-stone-600 text-xs">
        <p>Data provided by Yahoo Finance. Automatically updated via GitHub Actions.</p>
    </footer>

    <script>
        function getColorClass(val) {
            if (val > 1.0) return 'text-emerald-400';
            if (val > 0) return 'text-emerald-500/70';
            if (val < -1.0) return 'text-rose-500';
            if (val < 0) return 'text-rose-400/70';
            return 'text-stone-400';
        }

        async function render() {
            try {
                // キャッシュ回避のためにタイムスタンプを付与
                const cacheBuster = new Date().getTime();
                const response = await fetch(`./dashboard_data.json?t=${cacheBuster}`);
                
                if (!response.ok) throw new Error('Data not found');
                
                const data = await response.json();
                
                // タイムスタンプのフォーマット
                const updateTime = new Date(data.timestamp);
                document.getElementById('timestamp').innerText = `Last Updated: ${updateTime.toLocaleString()} (JST)`;
                
                // ステータス表示の更新
                const statusEl = document.getElementById('status-display');
                statusEl.innerText = data.status;
                // 色の調整
                statusEl.className = 'mb-8 p-4 bg-stone-900 border-l-4 rounded shadow-lg text-lg font-bold ';
                if(data.status.includes('🟢')) statusEl.classList.add('border-emerald-500', 'text-emerald-400');
                else if(data.status.includes('🔴')) statusEl.classList.add('border-rose-500', 'text-rose-400', 'blink');
                else if(data.status.includes('🟡') || data.status.includes('🟠')) statusEl.classList.add('border-amber-500', 'text-amber-400');
                else statusEl.classList.add('border-stone-500', 'text-stone-300');

                // 各Tierの更新
                const configMapping = {
                    'TIER_1': { list: 't1-list', avg: 't1-avg' },
                    'TIER_1_5': { list: 't15-list', avg: 't15-avg' },
                    'TIER_2': { list: 't2-list', avg: 't2-avg' }
                };

                for (const [tierKey, ids] of Object.entries(configMapping)) {
                    // 平均値の更新
                    const avgVal = data.layers[tierKey];
                    const avgEl = document.getElementById(ids.avg);
                    avgEl.innerText = `${avgVal > 0 ? '+' : ''}${avgVal.toFixed(2)}%`;
                    avgEl.className = `text-2xl font-black mb-4 ${getColorClass(avgVal)}`;

                    // リストの更新
                    const container = document.getElementById(ids.list);
                    container.innerHTML = '';
                    
                    const tickers = data.config[tierKey];
                    tickers.forEach(t => {
                        const d = data.details[t];
                        if (!d) return;
                        
                        const color = getColorClass(d.change);
                        container.innerHTML += `
                            <div class="flex justify-between items-center p-2 bg-stone-950/50 rounded border border-stone-800/50 hover:bg-stone-800 transition-colors">
                                <div class="flex flex-col">
                                    <span class="font-bold text-stone-200">${t}</span>
                                    <span class="text-[10px] text-stone-500">$${d.price}</span>
                                </div>
                                <span class="${color} font-mono text-sm font-bold">
                                    ${d.change > 0 ? '+' : ''}${d.change.toFixed(2)}%
                                </span>
                            </div>`;
                    });
                }
            } catch (e) {
                console.error(e);
                document.getElementById('status-display').innerText = "🔴 データの取得に失敗しました。GitHub Actionsの実行を待っています。";
            }
        }

        // 初回実行
        render();
        // 念のため定期的にリロード（JSONが更新されたか確認するため）
        setInterval(render, 60000);
    </script>
</body>
</html>
