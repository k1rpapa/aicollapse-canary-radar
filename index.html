<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infrastructure Canary Terminal v10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-stone-950 text-stone-200 p-4 md:p-8">
    <header class="mb-8 border-b border-stone-800 pb-4">
        <h1 class="text-2xl md:text-3xl font-black text-cyan-500 tracking-tighter">CANARY RADAR v10.0</h1>
        <div class="flex items-center mt-2">
            <div class="w-2 h-2 bg-emerald-500 rounded-full blink mr-2"></div>
            <p id="timestamp" class="text-stone-500 text-xs md:text-sm">Connecting to orbital satellite...</p>
        </div>
    </header>

    <div id="status-display" class="mb-8 p-4 bg-stone-900 border-l-4 border-stone-600 rounded shadow-lg text-lg font-bold">待機中...</div>

    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4" id="dashboard">
        
        <div class="bg-stone-900 p-4 rounded-xl border border-stone-800 relative">
            <h2 class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-4">Tier 1: Foundation</h2>
            <div id="t1-avg" class="text-xl font-black mb-4">-</div>
            <div id="t1-list" class="space-y-1"></div>
        </div>
        
        <div class="bg-stone-900 p-4 rounded-xl border border-stone-800 relative">
            <h2 class="text-xs font-bold text-amber-400 uppercase tracking-widest mb-4">Tier 1.5: Compute</h2>
            <div id="t15-avg" class="text-xl font-black mb-4">-</div>
            <div id="t15-list" class="space-y-1"></div>
        </div>

        <div class="bg-stone-900 p-4 rounded-xl border border-stone-800 relative">
            <h2 class="text-xs font-bold text-fuchsia-400 uppercase tracking-widest mb-4">Tier 2: Velocity</h2>
            <div id="t2-avg" class="text-xl font-black mb-4">-</div>
            <div id="t2-list" class="space-y-1"></div>
        </div>

        <div class="bg-stone-900 p-4 rounded-xl border border-stone-800 relative">
            <h2 class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-4">Tier 3: Upstream</h2>
            <div id="t3-avg" class="text-xl font-black mb-4">-</div>
            <div id="t3-list" class="space-y-1"></div>
        </div>

        <div class="bg-stone-900 p-4 rounded-xl border border-emerald-800 relative shadow-[0_0_15px_rgba(16,185,129,0.1)]">
            <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-widest mb-4">Tier 4: True Asset<br><span class="text-[9px] text-stone-500">データ資源・SaaS関所</span></h2>
            <div id="t4-avg" class="text-xl font-black mb-4">-</div>
            <div id="t4-list" class="space-y-1 h-[400px] overflow-y-auto pr-2 custom-scrollbar"></div>
        </div>
    </div>

    <script>
        function getColorClass(val) {
            if (val > 1.0) return 'text-emerald-400';
            if (val > 0) return 'text-emerald-500/70';
            if (val < -1.0) return 'text-rose-500';
            if (val < 0) return 'text-rose-400/70';
            return 'text-stone-400';
        }

        async function render() {
            try {
                const response = await fetch(`./dashboard_data.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                document.getElementById('timestamp').innerText = `Last Updated: ${new Date(data.timestamp).toLocaleString()} (JST)`;
                
                const statusEl = document.getElementById('status-display');
                statusEl.innerText = data.status;
                statusEl.className = 'mb-8 p-4 bg-stone-900 border-l-4 rounded shadow-lg text-lg font-bold ';
                if(data.status.includes('🟢')) statusEl.classList.add('border-emerald-500', 'text-emerald-400');
                else if(data.status.includes('🔴')) statusEl.classList.add('border-rose-500', 'text-rose-400', 'blink');
                else if(data.status.includes('🟡') || data.status.includes('🟠')) statusEl.classList.add('border-amber-500', 'text-amber-400');
                else statusEl.classList.add('border-stone-500', 'text-stone-300');

                const mapping = {
                    'TIER_1': { list: 't1-list', avg: 't1-avg' },
                    'TIER_1_5': { list: 't15-list', avg: 't15-avg' },
                    'TIER_2': { list: 't2-list', avg: 't2-avg' },
                    'TIER_3': { list: 't3-list', avg: 't3-avg' },
                    'TIER_4': { list: 't4-list', avg: 't4-avg' }
                };

                for (const [tier, ids] of Object.entries(mapping)) {
                    const avgVal = data.layers[tier];
                    document.getElementById(ids.avg).innerText = `${avgVal > 0 ? '+' : ''}${avgVal.toFixed(2)}%`;
                    document.getElementById(ids.avg).className = `text-xl font-black mb-4 ${getColorClass(avgVal)}`;

                    const container = document.getElementById(ids.list);
                    container.innerHTML = '';
                    data.config[tier].forEach(t => {
                        const d = data.details[t];
                        if (!d) return;
                        
                        // Volume Surge を視覚化 (1.5倍以上で発光)
                        const surgeIndicator = d.vol_surge > 1.5 ? `<span class="text-[8px] bg-amber-500 text-stone-900 px-1 rounded ml-1 animate-pulse">VOL SURGE</span>` : '';

                        container.innerHTML += `
                            <div class="flex justify-between items-center p-1.5 bg-stone-950/50 rounded border border-stone-800/50">
                                <div class="flex flex-col">
                                    <div class="flex items-center">
                                        <a href="https://finance.yahoo.com/quote/${t}" target="_blank" class="font-bold text-sm text-stone-200 hover:text-cyan-400">${t}</a>
                                        ${surgeIndicator}
                                    </div>
                                    <span class="text-[9px] text-stone-500">$${d.price}</span>
                                </div>
                                <span class="${getColorClass(d.change)} font-mono text-xs font-bold">
                                    ${d.change > 0 ? '+' : ''}${d.change.toFixed(2)}%
                                </span>
                            </div>`;
                    });
                }
            } catch (e) { console.error(e); }
        }
        render(); setInterval(render, 60000);
    </script>
</body>
</html>
