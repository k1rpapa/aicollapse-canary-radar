<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Infrastructure Canary Terminal v9.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-950 text-stone-200 p-8">
    <header class="mb-8">
        <h1 class="text-3xl font-black text-white">PHYSICAL INFRASTRUCTURE CANARY v9.5</h1>
        <p id="timestamp" class="text-stone-500 font-mono text-sm">Waiting for data stream...</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="dashboard">
        <div class="bg-stone-900 p-6 rounded-2xl border border-stone-800">
            <h2 class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-4">Tier 1: Foundation</h2>
            <div id="t1-list" class="space-y-3"></div>
        </div>
        <div class="bg-stone-900 p-6 rounded-2xl border border-stone-800">
            <h2 class="text-xs font-bold text-amber-400 uppercase tracking-widest mb-4">Tier 1.5: Compute & Fabric</h2>
            <div id="t15-list" class="space-y-3"></div>
        </div>
        <div class="bg-stone-900 p-6 rounded-2xl border border-stone-800">
            <h2 class="text-xs font-bold text-fuchsia-400 uppercase tracking-widest mb-4">Tier 2: Velocity</h2>
            <div id="t2-list" class="space-y-3"></div>
        </div>
    </div>

    <div id="status-display" class="mt-8 p-4 bg-stone-900 border border-stone-700 rounded-lg text-center font-bold">
        待機中: Pythonスクリプトでデータを生成してください
    </div>

    <script>
        // ブラウザの制約を回避するため、データ取得ロジックを簡略化
        async function render() {
            try {
                // セキュリティ制限回避のため、相対パスでのJSON取得を試行
                const response = await fetch('./dashboard_data.json');
                const data = await response.json();
                
                document.getElementById('timestamp').innerText = `Last Updated: ${new Date(data.timestamp).toLocaleString()}`;
                document.getElementById('status-display').innerText = data.status;

                const configMapping = {
                    'TIER_1': 't1-list',
                    'TIER_1_5': 't15-list',
                    'TIER_2': 't2-list'
                };

                for (const [tierKey, containerId] of Object.entries(configMapping)) {
                    const container = document.getElementById(containerId);
                    container.innerHTML = '';
                    
                    const tickers = data.config[tierKey];
                    tickers.forEach(t => {
                        const d = data.details[t];
                        if (!d) return;
                        
                        container.innerHTML += `
                            <div class="flex justify-between p-3 bg-stone-950 rounded-lg border border-stone-800">
                                <span class="font-bold text-stone-300">${t}</span>
                                <span class="${d.change >= 0 ? 'text-emerald-400' : 'text-rose-400'} font-mono">
                                    ${d.change > 0 ? '+' : ''}${d.change.toFixed(2)}%
                                </span>
                            </div>`;
                    });
                }
            } catch (e) {
                console.warn("データ取得待ちです...");
            }
        }

        setInterval(render, 3000);
    </script>
</body>
</html>
