<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanaryInTheGrid - Macro Radar</title>
    <!-- Chart.jsの読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; }
        .panel { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .alert-box { 
            padding: 15px; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 1.2em; 
            margin-bottom: 15px;
        }
        .alert-normal { background-color: #1b5e20; color: #fff; }
        .alert-danger { background-color: #b71c1c; color: #fff; }
        .data-text { font-size: 1.1em; line-height: 1.6; }
        .data-text b { color: #fff; }
        canvas { max-width: 100%; height: 400px; }
    </style>
</head>
<body>

    <h2>📊 CanaryInTheGrid : Macro Command Center</h2>

    <!-- 金融レイヤーパネル -->
    <div class="panel">
        <h3>［1. 金融レイヤー］ 天然ガス先物 フォワードカーブ（マージナル・セッター）</h3>
        <div id="signal-box" class="alert-box">データのロード中...</div>
        <div class="data-text" id="spread-details"></div>
    </div>

    <!-- 物理レイヤーパネル -->
    <div class="panel">
        <h3>［2. 物理レイヤー］ PJM 実電力需要 Seasonality (過去5年レンジ vs 今年)</h3>
        <canvas id="seasonalityChart"></canvas>
    </div>

    <script>
        // ★ここにGCP Cloud FunctionsのデプロイURLを貼り付ける
        const API_URL = "https://us-east1-canary-grid-2026.cloudfunctions.net/pjm-canary-crawler";

        async function fetchRadarData() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if(result.status === "success") {
                    renderFinancialLayer(result.financial_forward_curve);
                    renderPhysicalLayer(result.grid_physical_data);
                } else {
                    document.getElementById('signal-box').innerText = "バックエンド・エラー: " + result.message;
                    document.getElementById('signal-box').className = "alert-box alert-danger";
                }
            } catch (error) {
                document.getElementById('signal-box').innerText = "通信エラー：APIに到達できません。CORS設定等を確認してください。";
                document.getElementById('signal-box').className = "alert-box alert-danger";
            }
        }

        function renderFinancialLayer(data) {
            const box = document.getElementById('signal-box');
            box.innerText = data.signal;
            
            // スプレッドがマイナス（バックワーデーション）なら赤色のアラート
            if(data.spread_delta < 0) {
                box.className = "alert-box alert-danger";
            } else {
                box.className = "alert-box alert-normal";
            }

            document.getElementById('spread-details').innerHTML = 
                `期近 契約 (${data.near_month_ticker}): <b>$${data.near_month_price}</b><br>` +
                `期先 契約 (${data.far_month_ticker}): <b>$${data.far_month_price}</b><br>` +
                `スプレッド (Δ): <b>$${data.spread_delta}</b>`;
        }

        function renderPhysicalLayer(data) {
            const ctx = document.getElementById('seasonalityChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [
                        {
                            label: '今年の実需要推移',
                            data: data.current_year,
                            borderColor: '#ff5252',
                            backgroundColor: '#ff5252',
                            borderWidth: 2,
                            tension: 0.1,
                            pointRadius: 1,
                            order: 1
                        },
                        {
                            label: '過去5年平均 (ベースライン)',
                            data: data.historical_avg,
                            borderColor: '#4fc3f7',
                            borderDash: [5, 5],
                            borderWidth: 2,
                            tension: 0.1,
                            pointRadius: 0,
                            order: 2
                        },
                        {
                            label: '過去5年最大',
                            data: data.historical_max,
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            backgroundColor: 'rgba(255, 255, 255, 0.1)',
                            fill: '+1', // 次のデータセット（過去5年最小）までを塗りつぶす
                            pointRadius: 0,
                            tension: 0.1,
                            order: 3
                        },
                        {
                            label: '過去5年最小',
                            data: data.historical_min,
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            fill: false,
                            pointRadius: 0,
                            tension: 0.1,
                            order: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { 
                            title: { display: true, text: '電力需要 (MWh)', color: '#aaa' }, 
                            grid: { color: '#333' },
                            ticks: { color: '#aaa' }
                        },
                        x: { 
                            grid: { color: '#333' },
                            ticks: { color: '#aaa', maxTicksLimit: 12 }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#e0e0e0' } },
                        tooltip: { backgroundColor: 'rgba(0,0,0,0.8)' }
                    }
                }
            });
        }

        // 初期化実行
        fetchRadarData();
    </script>
</body>
</html>
