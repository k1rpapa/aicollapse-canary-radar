name: Canary Infrastructure Auto-Update

on:
  schedule:
    # 平日の毎日、UTC時間で 0:00, 12:00 に実行 (日本時間 9:00, 21:00)
    - cron: '0 0,12 * * 1-5'
  workflow_dispatch: # GitHubの画面から手動で実行できるボタンを追加

permissions:
  contents: write # リポジトリに変更(jsonファイル)を書き込む権限

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Run Canary Monitor
        run: python canary_monitor.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dashboard_data.json
          # 変更がある場合のみコミットしてプッシュ
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard data" && git push)
